<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accedi — <[site_name]></title>
  <link rel="stylesheet" href="<[base_url]>css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="<[base_url]>" class="site-logo"><[site_name]></a>
    <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
    <nav class="main-nav">
      <a href="<[base_url]>" class="nav-link">Home</a>
      <a href="<[base_url]>tours.php" class="nav-link">Tour</a>
    </nav>
    <div class="nav-actions">
      <a href="<[base_url]>login.php" class="btn btn-sm btn-secondary">Accedi</a>
      <a href="<[base_url]>register.php" class="btn btn-sm btn-primary">Registrati</a>
    </div>
  </div>
</header>

<main class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🗺 <[site_name]></div>
    <h1 class="auth-title">Bentornato</h1>
    <p class="auth-subtitle">Accedi per prenotare i tuoi tour</p>

    <[if!empty flash_message]>
    <div class="alert alert-<[flash_type]>">
      <span><[flash_message]></span>
      <button class="alert-close" type="button">✕</button>
    </div>
    <[/if!empty]>

    <form method="POST" action="<[base_url]>login.php" novalidate>
      <input type="hidden" name="csrf_token" value="<[csrf_token]>">
      <input type="hidden" name="return_url" value="<[return_url]>">

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          class="form-control"
          value="<[login_username]>"
          placeholder="Il tuo username"
          autocomplete="username"
          required>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-control"
          placeholder="La tua password"
          autocomplete="current-password"
          required>
      </div>

      <button type="submit" class="btn btn-primary btn-full mt-2">Accedi</button>
    </form>

    <div class="auth-footer">
      Non hai un account? <a href="<[base_url]>register.php">Registrati gratuitamente</a>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="container">
    <div class="footer-bottom">
      <p>&copy; 2026 <[site_name]>. Tutti i diritti riservati.</p>
    </div>
  </div>
</footer>

<script src="<[base_url]>js/main.js"></script>
</body>
</html>
